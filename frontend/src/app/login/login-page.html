<div class="blob-top"></div>
<div class="blob-bottom"></div>

<main class="login-card">
  <div class="card-decor"></div>
  
  <div class="login-header">
    <img src="assets/logo.webp" alt="Conectar San José" class="login-logo" />
    <h1>Conectar San José</h1>
    <p>Municipalidad de San José</p>
  </div>

  <form class="login-form" (ngSubmit)="onLogin()">
    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <div class="input-wrapper">
        <span class="material-symbols-outlined input-icon">mail</span>
        <input type="email" id="email" [(ngModel)]="loginForm.email" name="email" placeholder="admin@sanjose.gob.ar" required />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper">
        <span class="material-symbols-outlined input-icon">lock</span>
        <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="loginForm.password" name="password" placeholder="••••••••" required />
        <button type="button" class="toggle-password" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
          <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
    </div>

    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="loginForm.rememberMe" name="rememberMe" />
        <div class="custom-checkbox">
          <span class="material-symbols-outlined">check</span>
        </div>
        <span style="font-size: 14px; color: #604868;">Recordarme</span>
      </label>
      <a class="forgot-password" routerLink="/forgot-password">¿Olvidó su contraseña?</a>
    </div>

    <div style="padding-top: 16px;">
      <button type="submit" class="submit-button">
        <span>Ingresar</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </form>
</main>

<footer class="login-footer">
  <div class="footer-content">
    <p>© 2026 Municipalidad de San José.</p>

      <div class="footer-contacto">

          Centenario 1098
        </a>
