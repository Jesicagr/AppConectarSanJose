<div class="admin-shell">
  <button
    type="button"
    class="mobile-scrim"
    [class.visible]="sidebarOpen"
    aria-label="Cerrar menú"
    (click)="closeSidebar()"
  ></button>

  <nav class="sidebar" [class.open]="sidebarOpen" aria-label="Navegación lateral">
    <div class="sidebar-brand">
      <div>
        <h2>Gestión Interna</h2>
        <p>Municipalidad de San José</p>
      </div>
      <button type="button" class="mobile-icon-button" aria-label="Cerrar menú" (click)="closeSidebar()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="profile-card">
      <div class="avatar" aria-hidden="true">SJ</div>
      <div>
        <strong>Admin San José</strong>
        <span>Superusuario</span>
      </div>
    </div>

    <div class="nav-list">
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
          (click)="closeSidebar()"
        >
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="sidebar-footer">
      <a href="#" class="nav-link danger">
        <span class="material-symbols-outlined">logout</span>
        <span>Cerrar Sesión</span>
      </a>
    </div>
  </nav>

  <main class="main-panel">
    <button type="button" class="floating-menu mobile-icon-button" aria-label="Abrir menú" (click)="openSidebar()">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <router-outlet />
  </main>
</div>
